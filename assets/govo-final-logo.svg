<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="GOVO Express">
  <defs>
    <linearGradient id="govoGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CFF00"/>
      <stop offset="52%" stop-color="#67D51D"/>
      <stop offset="100%" stop-color="#2E8E19"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="#020403"/>

  <!-- GO mark -->
  <g transform="translate(135 68)" filter="url(#softGlow)">
    <!-- G -->
    <path d="M247 24
             C165 12 84 64 58 145
             C25 246 91 350 198 365
             C281 377 356 332 389 263
             L242 263
             L268 195
             L470 195
             C478 295 414 392 310 426
             C181 468 41 392 7 263
             C-26 137 50 12 178 -18
             C240 -32 305 -18 354 17
             L318 77
             C298 50 276 31 247 24Z"
          fill="url(#govoGreen)"/>

    <!-- G inner bar -->
    <path d="M209 205 L402 205 L402 262 L181 262 Z" fill="url(#govoGreen)"/>

    <!-- O white ring -->
    <circle cx="522" cy="225" r="117" fill="none" stroke="#FFFFFF" stroke-width="62"/>
    <path d="M428 133 C450 103 477 86 509 78" fill="none" stroke="#020403" stroke-width="34" stroke-linecap="round"/>

    <!-- V inside O -->
    <path d="M475 180 L525 288 L580 180 L536 180 L523 223 L508 180 Z" fill="url(#govoGreen)"/>

    <!-- connection waves -->
    <path d="M620 78 C678 106 710 162 710 225" fill="none" stroke="url(#govoGreen)" stroke-width="22" stroke-linecap="round"/>
    <path d="M662 36 C744 77 790 151 790 225" fill="none" stroke="url(#govoGreen)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(135 392)">
    <text x="0" y="0"
          font-family="Arial, Helvetica, sans-serif"
          font-size="52"
          font-weight="700"
          letter-spacing="21"
          fill="#7CFF1A">GOVO</text>

    <text x="333" y="0"
          font-family="Arial, Helvetica, sans-serif"
          font-size="52"
          font-weight="700"
          letter-spacing="21"
          fill="#FFFFFF">EXPRESS</text>

    <line x1="0" y1="55" x2="690" y2="55" stroke="#7CFF1A" stroke-width="3"/>

    <text x="0" y="108"
          font-family="Arial, Helvetica, sans-serif"
          font-size="30"
          font-weight="700"
          letter-spacing="7"
          fill="#FFFFFF">SMART SERVICE.</text>

    <text x="330" y="108"
          font-family="Arial, Helvetica, sans-serif"
          font-size="30"
          font-weight="700"
          letter-spacing="7"
          fill="#7CFF1A">STRONGER COMMUNITY.</text>
  </g>
</svg>
