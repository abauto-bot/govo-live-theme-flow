server {
listen 80;
    server_name app.govoexpress.com;
    return 301 https://$host$request_uri;

    # GOVO14C3_PREMIUM_APP_HOST_LOCK


    # GOVO14C3_AI_MAP_FALLBACK


    # GOVO14C3_AI_MAP_FALLBACK



    # GOVO14C3C_APP_PREMIUM_LOCK
    location = /app {

        # GOVO14C3D_EXACT_APP_HOST_GUARD
        if ($host ~* ^(rider|merchant|admin)\.govoexpress\.com$) {
            return 302 https://app.govoexpress.com/app;
        }

        add_header X-GOVO-14C3C "app-premium-lock" always;
        root /var/www;
        try_files /govo_phase14c3_premium_app.html =404;
    }

    # GOVO14C3C_APP_AI_MAP_REDIRECT
    location = /ai {
        return 302 https://app.govoexpress.com/app;
    }

    # GOVO14C3C_APP_AI_MAP_REDIRECT
    location = /map {
        return 302 https://app.govoexpress.com/app;
    }


    # GOVO14D_REGISTER_POST_FIX
    location = /merchant/register {
        proxy_pass http://127.0.0.1:8127/merchant;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # GOVO14D_REGISTER_POST_FIX
    location = /rider/register {
        proxy_pass http://127.0.0.1:8127/rider;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }



    # GOVO_INVENTORY_API_START
    location = /api/govo-inventory/health {
        proxy_pass http://127.0.0.1:8093/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/govo-inventory {
        proxy_pass http://127.0.0.1:8093/api/govo-inventory;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/govo-leads {
        proxy_pass http://127.0.0.1:8093/api/govo-leads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # GOVO_INVENTORY_API_END

}

server {
listen 443 ssl;
    server_name app.govoexpress.com;

    ssl_certificate /etc/letsencrypt/live/app.govoexpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.govoexpress.com/privkey.pem;

    client_max_body_size 50M;

    add_header X-GOVO-LIVE-APP "phase14a-onboarding-patch" always;
    add_header X-GOVO-UPSTREAM "8090" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

    location = /govo14a-onboarding.js {
        alias /opt/govo-14a-onboarding/public/onboarding.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-store";
    }

    location /api/onboarding/ {
        proxy_pass http://127.0.0.1:8096/api/onboarding/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /merchant {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/html;
        sub_filter_once on;
        sub_filter '</body>' '<script src="/govo14a-onboarding.js"></script></body>';
    }

    location = /rider {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_types text/html;
        sub_filter_once on;
        sub_filter '</body>' '<script src="/govo14a-onboarding.js"></script></body>';
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    # GOVO14C3_PREMIUM_APP_HOST_LOCK


    # GOVO14C3_AI_MAP_FALLBACK


    # GOVO14C3_AI_MAP_FALLBACK



    # GOVO14C3C_APP_PREMIUM_LOCK
    location = /app {

        # GOVO14C3D_EXACT_APP_HOST_GUARD
        if ($host ~* ^(rider|merchant|admin)\.govoexpress\.com$) {
            return 302 https://app.govoexpress.com/app;
        }

        add_header X-GOVO-14C3C "app-premium-lock" always;
        root /var/www;
        try_files /govo_phase14c3_premium_app.html =404;
    }

    # GOVO14C3C_APP_AI_MAP_REDIRECT
    location = /ai {
        return 302 https://app.govoexpress.com/app;
    }

    # GOVO14C3C_APP_AI_MAP_REDIRECT
    location = /map {
        return 302 https://app.govoexpress.com/app;
    }


    # GOVO14D_REGISTER_POST_FIX
    location = /merchant/register {
        proxy_pass http://127.0.0.1:8127/merchant;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # GOVO14D_REGISTER_POST_FIX
    location = /rider/register {
        proxy_pass http://127.0.0.1:8127/rider;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }


    # GOVO_ADMIN_NGINX_THEME_SAFE_INCLUDE
    include /etc/nginx/snippets/govo-admin-nginx-theme.conf;

    # GOVO_FULL_FLOW_UNIFIED_START
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter '</head>' '<link rel="stylesheet" href="/assets/govo-flow-unified.css?v=20260709_051704"><script defer src="/assets/govo-flow-unified.js?v=20260709_051704"></script></head>';
    # GOVO_FULL_FLOW_UNIFIED_END


    # GOVO_INVENTORY_API_START
    location = /api/govo-inventory/health {
        proxy_pass http://127.0.0.1:8093/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/govo-inventory {
        proxy_pass http://127.0.0.1:8093/api/govo-inventory;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/govo-leads {
        proxy_pass http://127.0.0.1:8093/api/govo-leads;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    # GOVO_INVENTORY_API_END

}
