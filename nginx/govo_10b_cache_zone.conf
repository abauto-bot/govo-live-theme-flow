# GOVO PHASE 10B - cache zone + safe skip maps
# Public GET/HEAD cache only. Auth/cookie/admin/api/notify skipped.

proxy_cache_path /var/cache/nginx/govo_app
  levels=1:2
  keys_zone=GOVO_APP_CACHE:10m
  max_size=100m
  inactive=5m
  use_temp_path=off;

map $request_method $govo_skip_cache_method {
  default 1;
  GET 0;
  HEAD 0;
}

map $request_uri $govo_skip_cache_uri {
  default 0;
  ~^/api 1;
  ~^/notify 1;
  ~^/admin 1;
  ~^/merchant/dashboard 1;
  ~^/rider/dashboard 1;
  ~[?&](token|pin|password|auth|nocache)= 1;
}
